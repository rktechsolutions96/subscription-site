<!DOCTYPE html>
<html>
<head>
  <title>Subscription Plans</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {font-family: Arial; text-align:center; background:#f5f5f5;}
    h1 {margin-top:20px;}
    .container {display:flex; flex-wrap:wrap; justify-content:center;}
    .card {
      background:white; padding:20px; margin:15px;
      border-radius:10px; width:260px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }
    .price {font-size:24px; color:green;}
    .duration {color:#555; margin-bottom:10px;}
    button {
      background:#007bff; color:white;
      border:none; padding:10px 15px;
      border-radius:5px; cursor:pointer;
    }
  </style>
</head>
  <body>

<!-- HEADER -->
    
<div style="
  display:flex;
  align-items:center;
  justify-content:center;
  background: linear-gradient(90deg, #0f2027, #2c5364);
  padding:14px;
  color:white;
  font-size:20px;
  font-weight:bold;
  gap:12px;
  box-shadow: 0 0 15px rgba(0,0,0,0.6);
  position:sticky;
  top:0;
  z-index:999;
">
  <img src="logo.png" style="
    height:50px;
    width:50px;
    border-radius:50%;
    border:2px solid white;
    box-shadow: 0 0 10px #00f, 0 0 20px #00f;
  " />

  <div>
    RK TECH SOLUTIONS
    <div style="font-size:12px; opacity:0.8;">
      Smart Digital Services 🚀
    </div>
  </div>

</div>

<!-- OFFER BAR -->
<div style="
  background:#ff9800;
  color:black;
  text-align:center;
  padding:6px;
  font-size:14px;
  font-weight:bold;
">
  🔥 Limited Offer – Get Premium Access Now 🚀
</div>

<h1>🔥 Subscription Plans 🔥</h1>

<div class="container">

  <div class="card">
    <h2>Basic Plan</h2>
    <p class="price">₹99</p>
    <p class="duration">Duration: 1 Month</p>
    <p>✔ Basic Access</p>
    <button onclick="buy('Basic - 1 Month')">Buy Now</button>
  </div>

  <div class="card">
    <h2>Standard Plan</h2>
    <p class="price">₹499</p>
    <p class="duration">Duration: 6 Months</p>
    <p>✔ Full Access</p>
    <button onclick="buy('Standard - 6 Months')">Buy Now</button>
  </div>

  <div class="card">
    <h2>Premium Plan</h2>
    <p class="price">₹899</p>
    <p class="duration">Duration: 1 Year</p>
    <p>✔ All Features</p>
    <button onclick="buy('Premium - 1 Year')">Buy Now</button>
  </div>

</div>

<script>
function buy(plan){
  alert(plan + " selected!");
}
</script>

</body>
</html>
